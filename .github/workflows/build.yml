name: Build and Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            name: ytdl-linux
          - os: windows-latest
            name: ytdl.exe
          - os: macos-latest
            name: ytdl-macos
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: pip install pyinstaller .
      - run: pyinstaller --onefile --name ${{ matrix.name }} --hidden-import textual --hidden-import ytdl.tui --hidden-import ytdl --collect-all ytdl src/ytdl/cli.py
      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.name }}
          path: dist/${{ matrix.name }}

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          pattern: ytdl*
          merge-multiple: true
          path: artifacts
      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          name: Release ${{ github.ref_name }}
          body: |
            ## ytdl ${{ github.ref_name }}

            Standalone binaries for all platforms. No Python or dependencies needed.

            ### Download
            - **Windows** → `ytdl.exe`
            - **Linux** → `ytdl-linux`
            - **macOS** → `ytdl-macos`
          files: artifacts/*
          generate_release_notes: true
